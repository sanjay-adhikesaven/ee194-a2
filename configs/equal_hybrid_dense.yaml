# Equal-size data quality ablation: Hybrid (curated+synthetic), Dense 382M, 1.3B tokens
# Part of controlled comparison holding model + token count constant

experiment_id: equal_hybrid_dense

model:
  vocab_size: 16384
  hidden_size: 1024
  num_layers: 24
  num_attention_heads: 16
  num_kv_heads: 4
  intermediate_size: 4096
  max_position_embeddings: 2048
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0
  initializer_range: 0.02
  tie_word_embeddings: true
  num_experts: 0

train:
  data_path: /mnt/nvme_tmp/ee194-a2-work/partb_data_designer_exports/partb_hybrid_training_data.jsonl
  output_dir: runs/equal_hybrid_dense
  tokenizer_dir: tokenizer_16k
  batch_size: 8
  gradient_accumulation_steps: 4
  max_tokens: 1300000000
  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-8
  max_grad_norm: 1.0
  warmup_fraction: 0.01
  num_epochs: 1
  dtype: bfloat16
  compile_model: true
  use_fsdp: true
  log_interval: 100
  save_interval_steps: 5000
  save_interval_epochs: 1
  wandb_project: ee194-a2-pretrain
  wandb_run_name: equal_hybrid_dense
  seed: 42
