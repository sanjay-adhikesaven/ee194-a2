# Full-size scaling: Raw data, MoE 390M active / 1.4B total, all ~36.5B tokens

experiment_id: full_raw_moe

model:
  vocab_size: 16384
  hidden_size: 768
  num_layers: 24
  num_attention_heads: 12
  num_kv_heads: 4
  intermediate_size: 3072
  max_position_embeddings: 2048
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0
  initializer_range: 0.02
  tie_word_embeddings: true
  num_experts: 8
  num_experts_per_tok: 2
  moe_aux_loss_coeff: 0.01

train:
  data_path: /mnt/nvme_tmp/ee194-a2-work/mixture_raw_data_sharded_25m_main
  output_dir: runs/full_raw_moe
  tokenizer_dir: tokenizer_16k
  batch_size: 16
  gradient_accumulation_steps: 1
  max_tokens: 0
  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-8
  max_grad_norm: 1.0
  warmup_fraction: 0.01
  num_epochs: 1
  dtype: bfloat16
  compile_model: true
  use_fsdp: true
  log_interval: 100
  save_interval_steps: 5000
  save_interval_epochs: 1
  wandb_project: ee194-a2-pretrain
  wandb_run_name: full_raw_moe
  seed: 42
  resume_from: ""